horus_unity_bridge:
  ros__parameters:
    # Network Configuration
    tcp_ip: "0.0.0.0"
    tcp_port: 10000
    transport_protocol: "horuslink"
    horuslink_bulk_port: 10001
    max_connections: 10

    # Performance Tuning
    socket_buffer_size: 65536  # 64KB socket buffer
    worker_threads: 4          # Number of worker threads for message processing

    # Connection Settings
    keepalive_interval_ms: 1000
    tcp_nodelay: true          # Disable Nagle's algorithm for low latency

    # Logging
    log_level: "debug"          # debug, info, warn, error
    log_protocol_messages: true
    log_connection_events: true

    # Features
    enable_dynamic_registration: true
    enable_service_calls: true
    enable_topic_list_query: true

    # Security (for future implementation)
    enable_authentication: false
    enable_encryption: false

    webrtc:
      enabled: true
      client_signal_topic: "/horus/webrtc/client_signal"
      server_signal_topic: "/horus/webrtc/server_signal"
      session_timeout_sec: 20
      default_bitrate_kbps: 2000
      default_framerate: 20
      default_encoder: "x264enc"
      default_pipeline: ""
      default_stun_servers:
        - "stun:stun.l.google.com:19302"
